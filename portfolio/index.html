<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Sree Ram Gopal Reddy</title>
  <meta name="description" content="MVP and production-ready AI products by Sree Ram Gopal Reddy." />
  <link rel="stylesheet" href="../assets/css/main.css?v=3" />
  <style>
    .portfolio-header {
      padding: 3rem 0 2rem;
    }
    .portfolio-header h2 {
      margin-bottom: 0.5rem;
    }
    .portfolio-header p {
      font-size: 15px;
      color: var(--col-text-muted);
    }

    .filter-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      font-size: 12px;
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid var(--col-border);
      background: none;
      color: var(--col-text-muted);
      cursor: pointer;
      font-family: var(--font-body);
      transition: all 0.15s;
    }
    .filter-btn.active,
    .filter-btn:hover {
      background: var(--col-text);
      color: var(--col-bg);
      border-color: var(--col-text);
    }

    .projects-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 560px) {
      .projects-grid { grid-template-columns: 1fr; }
    }

    .proj-card {
      background: var(--col-surface);
      border: 1px solid var(--col-border);
      border-radius: var(--radius-lg);
      padding: 1.4rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      box-shadow: var(--shadow-card);
    }
    .proj-card:hover {
      border-color: var(--col-border-strong);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    .proj-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .proj-icon {
      width: 40px; height: 40px;
      border-radius: var(--radius-md);
      background: var(--col-bg);
      border: 1px solid var(--col-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: var(--col-text-muted);
      flex-shrink: 0;
    }
    .proj-card h3 {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .proj-card p {
      font-size: 13px;
      color: var(--col-text-muted);
      line-height: 1.55;
    }
    .proj-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .proj-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 10px;
      border-top: 1px solid var(--col-border);
      margin-top: auto;
    }
    .proj-link-text {
      font-size: 12px;
      color: var(--col-accent);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 0;
      color: var(--col-text-muted);
      font-size: 14px;
    }

    /* LinkedIn CTA at bottom */
    .contact-strip {
      margin-top: 3rem;
      padding: 1.25rem 1.5rem;
      border: 1px dashed var(--col-border-strong);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      background: var(--col-surface);
    }
    .contact-strip p { font-size: 13px; color: var(--col-text-muted); }
    .contact-strip strong { color: var(--col-text); }

    @media (max-width: 520px) {
      .contact-strip { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<nav id="site-nav"></nav>

<main class="page-wrap">

  <header class="portfolio-header fade-up">
    <div class="label" style="margin-bottom:0.75rem">Portfolio</div>
    <h2>All projects</h2>
    <p id="portfolio-sub">MVP and production-ready AI products</p>
  </header>

  <div class="filter-bar fade-up delay-1" id="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="mvp">MVP</button>
    <button class="filter-btn" data-filter="development">Under development</button>
    <button class="filter-btn" data-filter="production">Production</button>
  </div>

  <div class="projects-grid" id="projects-grid">
    <!-- filled by JS -->
  </div>

  <div class="contact-strip fade-up" id="contact-strip">
    <p><strong>Have a question about a specific project?</strong><br>Some details are restricted — reach out and I'll share what I can.</p>
    <a href="#" id="contact-li-btn" class="btn btn-li" target="_blank" rel="noopener">
      <i class="ti ti-brand-linkedin" aria-hidden="true"></i> Contact on LinkedIn
    </a>
  </div>

</main>

<footer id="site-footer"></footer>

<script src="../assets/js/loader.js?v=5"></script>
<script>
const ICONS = {
  'kmu-assistant': 'ti-message-chatbot',
  'kmu-assistant-flowise': 'ti-topology-star',
  'cv-recognition': 'ti-id-badge',
  default: 'ti-code'
};

(async () => {
  try {
  const { loadOwner, loadProjects, buildNav, buildFooter, statusBadge, tagList, ROOT } = window.SiteLoader;
  const [owner, projects] = await Promise.all([loadOwner(), loadProjects()]);

  buildNav(owner, 'portfolio');
  buildFooter(owner);
  document.getElementById('contact-li-btn').href = owner.socials.linkedin;

  const sorted = [...projects].sort((a, b) => a.order - b.order);

  function renderGrid(filter) {
    const filtered = filter === 'all' ? sorted : sorted.filter(p => p.status === filter);
    const grid = document.getElementById('projects-grid');
    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty-state">No projects with this status yet.</div>`;
      return;
    }
    grid.innerHTML = filtered.map((p, i) => {
      const icon = ICONS[p.slug] || ICONS.default;
      return `
        <a href="${ROOT}portfolio/${p.slug.toLowerCase()}/index.html" class="proj-card fade-up" style="animation-delay:${0.1 + i * 0.07}s">
          <div class="proj-card-top">
            <div>
              ${statusBadge(p.status)}
            </div>
            <div class="proj-icon"><i class="ti ${icon}" aria-hidden="true"></i></div>
          </div>
          <div>
            <h3>${p.title}</h3>
            <p>${p.tagline}</p>
          </div>
          <div class="proj-tags">${tagList(p.tags)}</div>
          <div class="proj-card-footer">
            <span class="proj-link-text">View project <i class="ti ti-arrow-right" style="font-size:13px" aria-hidden="true"></i></span>
          </div>
        </a>
      `;
    }).join('');
  }

  renderGrid('all');

  // Filter buttons
  document.getElementById('filter-bar').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid(btn.dataset.filter);
  });

  // Portfolio sub
  const dev = projects.filter(p => p.status === 'development').length;
  document.getElementById('portfolio-sub').textContent =
    `${projects.length} project${projects.length !== 1 ? 's' : ''} — ${projects.filter(p=>p.status==='mvp').length} MVP, ${dev ? `${dev} Under development, ` : ''}${projects.filter(p=>p.status==='production').length} Production`;

  document.title = `Portfolio — ${owner.name}`;
  } catch (err) {
    console.error(err);
    document.getElementById('projects-grid').innerHTML =
      `<div class="empty-state">Failed to load projects: ${err.message}. Try a hard refresh (Cmd+Shift+R).</div>`;
  }
})();
</script>
</body>
</html>
